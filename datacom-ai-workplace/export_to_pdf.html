<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Datacom Portfolio Submission</title>
<!-- Load marked.js to dynamically parse the Markdown -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.6;
    max-width: 800px;
    margin: 0 auto;
    color: #333;
    padding: 40px;
  }
  img {
    max-width: 100%;
    border-radius: 8px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    margin: 20px 0;
  }
  h1, h2, h3 { color: #1a1a1a; margin-top: 1.5em; }
  pre { background: #f6f8fa; padding: 16px; border-radius: 6px; overflow-x: auto; }
  code { font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 85%; padding: 0.2em 0.4em; background-color: rgba(175,184,193,0.2); border-radius: 6px; }
  pre code { background-color: transparent; padding: 0; }
  hr { border: 0; border-top: 1px solid #d0d7de; margin: 2em 0; }
  @media print {
    body { padding: 0; }
    /* Force page breaks at horizontal rules for clean PDF export */
    hr { page-break-after: always; border: none; }
  }
</style>
</head>
<body>
  <div id="content">Loading document...</div>
  <script>
    // Fetch the raw markdown file from the same directory
    fetch('./datacom_full_submission.md')
      .then(response => response.text())
      .then(text => {
        // Parse it to HTML using marked.js
        document.getElementById('content').innerHTML = marked.parse(text);
      })
      .catch(err => {
        document.getElementById('content').innerHTML = "<p style='color:red;'>Error loading markdown: " + err + ".<br>Please make sure you double-clicked this file from Finder so it can access datacom_full_submission.md.</p>";
      });
  </script>
</body>
</html>
